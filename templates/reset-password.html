<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwort zurücksetzen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css?v=<?= Config::ASSET_VERSION ?>">
    <link rel="stylesheet" href="/css/menus.css?v=<?= Config::ASSET_VERSION ?>">
    <link rel="stylesheet" href="/css/colors.css?v=<?= Config::ASSET_VERSION ?>">
    <link rel="stylesheet" href="/css/buttons.css?v=<?= Config::ASSET_VERSION ?>">
    <link rel="stylesheet" href="/css/login.css?v=<?= Config::ASSET_VERSION ?>">
</head>
<body>

<div class="login-container">
    <div class="login-brand">
        <img src="/imgs/logo.svg" alt="Lernmonitor">
        <span>Lernmonitor</span>
    </div>

    <form id="resetForm">
        <p class="login-info" id="reset-info">Bitte wählen Sie ein neues Passwort (mindestens 6 Zeichen).</p>
        <input id="rp-password" type="password" class="input-box" placeholder="Neues Passwort" autocomplete="new-password">
        <input id="rp-password-confirm" type="password" class="input-box" placeholder="Passwort bestätigen" autocomplete="new-password">

        <p class="login-error" id="reset-error" style="display:none"></p>
        <button type="submit" id="reset-btn" class="btn btn-confirm login-btn" disabled>Passwort speichern</button>
        <a href="/login" class="btn btn-confirm login-btn" id="reset-login-link" style="display:none">Zurück zum Login</a>
    </form>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token') || '';

    const pwEl       = document.getElementById('rp-password');
    const pwCfEl     = document.getElementById('rp-password-confirm');
    const infoEl     = document.getElementById('reset-info');
    const errorEl    = document.getElementById('reset-error');
    const btn        = document.getElementById('reset-btn');
    const loginLink  = document.getElementById('reset-login-link');
    const form       = document.getElementById('resetForm');

    function setError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = msg ? 'block' : 'none';
    }

    function updateBtn() {
        btn.disabled = pwEl.value.length < 6 || pwEl.value !== pwCfEl.value;
    }

    if (!token) {
        infoEl.textContent = 'Dieser Link ist ungültig. Bitte fordern Sie über die Login-Seite einen neuen Link an.';
        pwEl.style.display = 'none';
        pwCfEl.style.display = 'none';
        btn.style.display = 'none';
        loginLink.style.display = 'flex';
    } else {
        pwEl.addEventListener('input', () => { setError(''); updateBtn(); });
        pwCfEl.addEventListener('input', () => { setError(''); updateBtn(); });

        form.addEventListener('submit', async e => {
            e.preventDefault();
            setError('');
            btn.disabled = true;

            const resp = await fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password: pwEl.value }),
            });
            const data = await resp.json();

            if (data.status === 'ok') {
                infoEl.textContent = 'Ihr Passwort wurde erfolgreich geändert. Sie können sich jetzt anmelden.';
                pwEl.style.display = 'none';
                pwCfEl.style.display = 'none';
                btn.style.display = 'none';
                loginLink.style.display = 'flex';
            } else {
                infoEl.textContent = 'Dieser Link ist ungültig oder abgelaufen. Bitte fordern Sie über die Login-Seite einen neuen Link an.';
                pwEl.style.display = 'none';
                pwCfEl.style.display = 'none';
                btn.style.display = 'none';
                loginLink.style.display = 'flex';
            }
        });
    }
</script>
</body>
</html>
